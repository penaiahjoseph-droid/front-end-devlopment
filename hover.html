<!DOCTYPE html> 
<html> 
<head> 
<title>Hover Effects</title> 
<style> 
body { font-family: Arial; text-align: center; background-color: #f2f2f2; } 
.btn { padding: 10px 20px; background: #008CBA; color: white; transition: 0.3s; } 
.btn:hover { background: #4CAF50; } 
.card { background: white; width: 300px; margin: 20px auto; padding: 20px; transition: transform 0.3s; } 
.card:hover { transform: translateY(-10px); } 
</style> 
</head> 
<body> 
<div class="card"> 
<h2>CSS Hover Effects & Transitions</h2> 
<button class="btn">Hover Me</button> 
<h3>Hover Card</h3> 
<p>This card moves upward when hovered.</p> 
</div> 
</body> 
</html>
