<!DOCTYPE html> 
<html> 
<head> 
<title>To-Do List</title> 
<style> 
    .container { width: 400px; margin: 60px auto; background: white; padding: 20px; box-shadow: 0px 0px 
10px gray; text-align: center; } 
    li { background: #e6e6e6; margin: 10px 0; padding: 10px; display: flex; justify-content: space-between; 
} 
    .delete { background: red; color: white; border: none; cursor: pointer; } 
</style> 
<script> 
function addTask() { 
    let input = document.getElementById("task"); 
    if(input.value === "") { alert("Enter a task"); return; } 
    let li = document.createElement("li"); 
    li.textContent = input.value; 
    let delBtn = document.createElement("button"); 
    delBtn.textContent = "Delete"; delBtn.className = "delete"; 
    delBtn.onclick = function(){ li.remove(); }; 
    li.appendChild(delBtn); 
    document.getElementById("list").appendChild(li); 
    input.value = ""; 
} 
</script> 
</head> 
<body> 
    <div class="container"> 
        <h2>To-Do List</h2> 
        <input type="text" id="task" placeholder="Enter task"> 
        <button onclick="addTask()">Add</button> 
        <ul id="list"></ul> 
    </div> 
</body> 
</html>
